<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>YouTube иҰҒзҙ„</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
    background: #0d1117;
    color: #e6edf3;
    padding: 20px 16px 48px;
    min-height: 100vh;
  }
  h1 { font-size: 16px; color: #8b949e; text-align: center; margin-bottom: 4px; letter-spacing: 0.05em; }
  .sub { text-align: center; font-size: 11px; color: #484f58; margin-bottom: 24px; }
  .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
  label { font-size: 11px; color: #8b949e; display: block; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.08em; }
  input { width: 100%; background: #0d1117; border: 1px solid #30363d; border-radius: 8px; color: #e6edf3; font-size: 14px; padding: 10px 12px; outline: none; -webkit-appearance: none; }
  input:focus { border-color: #58a6ff; }
  .url-row { display: flex; gap: 8px; }
  .url-row input { flex: 1; }
  .btn-paste { background: #21262d; border: 1px solid #30363d; color: #8b949e; border-radius: 8px; padding: 10px 12px; font-size: 13px; cursor: pointer; white-space: nowrap; -webkit-tap-highlight-color: transparent; }
  .btn-paste:active { opacity: 0.7; }
  .btn-run { width: 100%; background: #1f6feb; border: none; color: #fff; border-radius: 10px; padding: 14px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 4px; -webkit-tap-highlight-color: transparent; transition: opacity 0.15s; }
  .btn-run:disabled { opacity: 0.4; cursor: default; }
  .btn-run:active:not(:disabled) { opacity: 0.8; }
  .loader { display: none; text-align: center; padding: 24px 0; color: #8b949e; font-size: 13px; }
  .loader.visible { display: block; }
  .spinner { width: 24px; height: 24px; border: 2px solid #30363d; border-top-color: #58a6ff; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error { display: none; color: #f85149; font-size: 13px; padding: 10px 12px; background: #2d1216; border: 1px solid #f8514933; border-radius: 8px; margin-top: 8px; }
  .error.visible { display: block; }
  .result-card { display: none; margin-top: 12px; }
  .result-card.visible { display: block; }
  .thumb { width: 100%; border-radius: 10px; margin-bottom: 12px; display: none; }
  .thumb.visible { display: block; }
  .md-body { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 18px 16px; font-size: 14px; line-height: 1.8; color: #c9d1d9; }
  .md-body h2 { font-size: 15px; font-weight: 700; color: #e6edf3; margin: 18px 0 8px; padding-bottom: 4px; border-bottom: 1px solid #30363d; }
  .md-body h2:first-child { margin-top: 0; }
  .md-body h3 { font-size: 13px; font-weight: 600; color: #58a6ff; margin: 12px 0 6px; }
  .md-body p { margin: 6px 0; }
  .md-body ul { padding-left: 18px; margin: 6px 0; }
  .md-body li { margin: 4px 0; }
  .md-body strong { color: #e6edf3; }
  .md-body hr { border: none; border-top: 1px solid #30363d; margin: 14px 0; }
  .md-body blockquote { border-left: 3px solid #58a6ff; padding-left: 12px; color: #8b949e; margin: 8px 0; }
  .action-row { display: flex; gap: 8px; margin-top: 10px; }
  .btn-copy-md { flex: 1; padding: 12px 8px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; -webkit-tap-highlight-color: transparent; background: #21262d; border: 1px solid #30363d; color: #8b949e; }
  .btn-copy-md:active { opacity: 0.7; }
  .btn-copy-notion { flex: 1; padding: 12px 8px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; -webkit-tap-highlight-color: transparent; background: #1f6feb; border: none; color: #fff; }
  .btn-copy-notion:active { opacity: 0.8; }
</style>
</head>
<body>
<h1>YouTube иҰҒзҙ„гғ„гғјгғ«</h1>
<p class="sub">зҷ»йҢІдёҚиҰҒгғ»е®Ңе…Ёз„Ўж–ҷ</p>

<div class="card">
  <label>YouTube URL</label>
  <div class="url-row">
    <input type="url" id="ytUrl" placeholder="https://www.youtube.com/watch?v=...">
    <button class="btn-paste" onclick="pasteUrl()">иІјд»ҳ</button>
  </div>
</div>

<button class="btn-run" id="runBtn" onclick="summarize()">иҰҒзҙ„гҒҷгӮӢ</button>

<div class="error" id="errorMsg"></div>

<div class="loader" id="loader">
  <div class="spinner"></div>
  и§ЈжһҗдёӯвҖҰпјҲе°‘гҖ…гҒҠеҫ…гҒЎгҒҸгҒ гҒ•гҒ„пјү
</div>

<div class="result-card" id="resultCard">
  <img class="thumb" id="thumb" alt="thumbnail">
  <div class="md-body" id="mdBody"></div>
  <div class="action-row">
    <button class="btn-copy-md" id="btnMd" onclick="copyMarkdown()">MarkdownгӮ’гӮігғ”гғј</button>
    <button class="btn-copy-notion" id="btnNotion" onclick="copyNotion()">NotionгҒ«гӮігғ”гғј</button>
  </div>
</div>

<script>
const $ = id => document.getElementById(id)
let rawMarkdown = ''

function parseMarkdown(md) {
  return md
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^---$/gm, '<hr>')
    .replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>')
    .replace(/^- \*\*(.+?)\*\*: (.+)$/gm, '<li><strong>$1</strong>: $2</li>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/(<li>[\s\S]*?<\/li>\n?)+/g, m => '<ul>' + m + '</ul>')
    .replace(/^(?!<[a-z]).+$/gm, m => m.trim() ? '<p>' + m + '</p>' : '')
    .replace(/\n/g, '')
}

async function pasteUrl() {
  try {
    const text = await navigator.clipboard.readText()
    if (text.includes('youtube.com') || text.includes('youtu.be')) $('ytUrl').value = text
  } catch { $('ytUrl').focus() }
}

function extractVideoId(url) {
  const patterns = [
    /[?&]v=([^&#]+)/,
    /youtu\.be\/([^?&#]+)/,
    /youtube\.com\/shorts\/([^?&#]+)/,
    /youtube\.com\/embed\/([^?&#]+)/,
  ]
  for (const p of patterns) { const m = url.match(p); if (m) return m[1] }
  return null
}

function showError(msg) { $('errorMsg').textContent = msg; $('errorMsg').classList.add('visible') }
function clearError() { $('errorMsg').classList.remove('visible') }

async function summarize() {
  clearError()
  $('resultCard').classList.remove('visible')
  $('loader').classList.remove('visible')

  const url = $('ytUrl').value.trim()
  if (!url) { showError('YouTube URLгӮ’е…ҘеҠӣгҒ—гҒҰгҒҸгҒ гҒ•гҒ„'); return }

  const videoId = extractVideoId(url)
  if (!videoId) { showError('жңүеҠ№гҒӘYouTube URLгӮ’е…ҘеҠӣгҒ—гҒҰгҒҸгҒ гҒ•гҒ„'); return }

  const cleanUrl = `https://www.youtube.com/watch?v=${videoId}`
  $('runBtn').disabled = true
  $('loader').classList.add('visible')
  $('thumb').src = `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`
  $('thumb').classList.add('visible')

  let videoTitle = ''
  try {
    const oembed = await fetch(`https://www.youtube.com/oembed?url=${encodeURIComponent(cleanUrl)}&format=json`)
    if (oembed.ok) videoTitle = (await oembed.json()).title || ''
  } catch {}

  const titleLine = videoTitle ? `гӮҝгӮӨгғҲгғ«: **${videoTitle}**\nURL: ${cleanUrl}` : `URL: ${cleanUrl}`
  const prompt = `д»ҘдёӢгҒ®YouTubeеӢ•з”»гӮ’ж—Ҙжң¬иӘһгҒ§иҰҒзҙ„гҒ—гҖҒеҝ…гҒҡMarkdownеҪўејҸгҒ§еҮәеҠӣгҒ—гҒҰгҒҸгҒ гҒ•гҒ„гҖӮ\n\n${titleLine}\n\nеҮәеҠӣгғ•гӮ©гғјгғһгғғгғҲпјҲгҒ“гҒ®гҒҫгҒҫдҪҝз”Ёпјү:\n\n## рҹ“Ң жҰӮиҰҒ\nпјҲеӢ•з”»гҒ®гғҶгғјгғһгҒЁзӣ®зҡ„гӮ’2пҪһ3ж–ҮгҒ§пјү\n\n---\n\n## вң… дё»гҒӘгғқгӮӨгғігғҲ\n- **гғқгӮӨгғігғҲ1**: иӘ¬жҳҺ\n- **гғқгӮӨгғігғҲ2**: иӘ¬жҳҺ\n- **гғқгӮӨгғігғҲ3**: иӘ¬жҳҺ\n- **гғқгӮӨгғігғҲ4**: иӘ¬жҳҺ\n- **гғқгӮӨгғігғҲ5**: иӘ¬жҳҺ\n\n---\n\n## рҹ’Ў зөҗи«–гғ»гҒҫгҒЁгӮҒ\nпјҲжңҖзөӮзҡ„гҒӘгғЎгғғгӮ»гғјгӮёгӮ„еӯҰгҒігӮ’2пҪһ3ж–ҮгҒ§пјү\n\n---\n\n> рҹҺҘ еӢ•з”»URL: ${cleanUrl}`

  try {
    const res = await fetch('https://text.pollinations.ai/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: [{ role: 'user', content: prompt }], model: 'openai', seed: 42, private: true })
    })
    if (!res.ok) throw new Error(`гӮЁгғ©гғј (${res.status})`)
    const text = await res.text()
    if (!text) throw new Error('зөҗжһңгҒҢеҸ–еҫ—гҒ§гҒҚгҒҫгҒӣгӮ“гҒ§гҒ—гҒҹ')
    rawMarkdown = text
    $('mdBody').innerHTML = parseMarkdown(text)
    $('resultCard').classList.add('visible')
  } catch (e) {
    showError(e.message)
    $('thumb').classList.remove('visible')
  } finally {
    $('runBtn').disabled = false
    $('loader').classList.remove('visible')
  }
}

function copyText(text, btnId, label) {
  const btn = $(btnId)
  const orig = btn.textContent
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).catch(() => execCopy(text))
  } else {
    execCopy(text)
  }
  btn.textContent = 'вң“ гӮігғ”гғјжёҲ'
  setTimeout(() => btn.textContent = orig, 1800)
}

function execCopy(text) {
  const ta = document.createElement('textarea')
  ta.value = text
  ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;'
  document.body.appendChild(ta)
  ta.focus(); ta.select()
  try { document.execCommand('copy') } catch {}
  document.body.removeChild(ta)
}

function copyMarkdown() { copyText(rawMarkdown, 'btnMd') }
function copyNotion() { copyText(rawMarkdown, 'btnNotion') }
</script>
</body>
</html>
