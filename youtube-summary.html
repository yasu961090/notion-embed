<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>YouTube 要約</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
    background: #0d1117;
    color: #e6edf3;
    padding: 20px 16px 48px;
    min-height: 100vh;
  }
  h1 {
    font-size: 16px;
    color: #8b949e;
    text-align: center;
    margin-bottom: 4px;
    letter-spacing: 0.05em;
  }
  .sub {
    text-align: center;
    font-size: 11px;
    color: #484f58;
    margin-bottom: 24px;
  }
  .card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
  }
  label {
    font-size: 11px;
    color: #8b949e;
    display: block;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  input {
    width: 100%;
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 8px;
    color: #e6edf3;
    font-size: 14px;
    padding: 10px 12px;
    outline: none;
    -webkit-appearance: none;
  }
  input:focus { border-color: #58a6ff; }
  .url-row { display: flex; gap: 8px; }
  .url-row input { flex: 1; }
  .btn-paste {
    background: #21262d;
    border: 1px solid #30363d;
    color: #8b949e;
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 13px;
    cursor: pointer;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-paste:active { opacity: 0.7; }
  .btn-run {
    width: 100%;
    background: #1f6feb;
    border: none;
    color: #fff;
    border-radius: 10px;
    padding: 14px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 4px;
    -webkit-tap-highlight-color: transparent;
    transition: opacity 0.15s;
  }
  .btn-run:disabled { opacity: 0.4; cursor: default; }
  .btn-run:active:not(:disabled) { opacity: 0.8; }
  .loader {
    display: none;
    text-align: center;
    padding: 24px 0;
    color: #8b949e;
    font-size: 13px;
  }
  .loader.visible { display: block; }
  .spinner {
    width: 24px; height: 24px;
    border: 2px solid #30363d;
    border-top-color: #58a6ff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 10px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error {
    display: none;
    color: #f85149;
    font-size: 13px;
    padding: 10px 12px;
    background: #2d1216;
    border: 1px solid #f8514933;
    border-radius: 8px;
    margin-top: 8px;
  }
  .error.visible { display: block; }
  .result-card {
    display: none;
    margin-top: 12px;
  }
  .result-card.visible { display: block; }
  .thumb {
    width: 100%;
    border-radius: 10px;
    margin-bottom: 12px;
    display: none;
  }
  .thumb.visible { display: block; }
  .md-body {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 12px;
    padding: 18px 16px;
    font-size: 14px;
    line-height: 1.8;
    color: #c9d1d9;
  }
  .md-body h2 {
    font-size: 15px;
    font-weight: 700;
    color: #e6edf3;
    margin: 18px 0 8px;
    padding-bottom: 4px;
    border-bottom: 1px solid #30363d;
  }
  .md-body h2:first-child { margin-top: 0; }
  .md-body h3 {
    font-size: 13px;
    font-weight: 600;
    color: #58a6ff;
    margin: 12px 0 6px;
  }
  .md-body p { margin: 6px 0; }
  .md-body ul { padding-left: 18px; margin: 6px 0; }
  .md-body li { margin: 4px 0; }
  .md-body strong { color: #e6edf3; }
  .md-body hr { border: none; border-top: 1px solid #30363d; margin: 14px 0; }
  .md-body blockquote {
    border-left: 3px solid #58a6ff;
    padding-left: 12px;
    color: #8b949e;
    margin: 8px 0;
  }
  .action-row { display: flex; gap: 8px; margin-top: 10px; }
  .btn-action {
    flex: 1;
    padding: 11px 8px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    -webkit-tap-highlight-color: transparent;
    transition: opacity 0.15s;
  }
  .btn-action:active { opacity: 0.75; }
  .btn-md { background: #21262d; border: 1px solid #30363d; color: #8b949e; }
  .btn-notion-copy { background: #1f6feb; color: #fff; }
</style>
</head>
<body>
<h1>YouTube 要約ツール</h1>
<p class="sub">登録不要・完全無料</p>

<div class="card">
  <label>YouTube URL</label>
  <div class="url-row">
    <input type="url" id="ytUrl" placeholder="https://www.youtube.com/watch?v=...">
    <button class="btn-paste" onclick="pasteUrl()">貼付</button>
  </div>
</div>

<button class="btn-run" id="runBtn" onclick="summarize()">要約する</button>

<div class="error" id="errorMsg"></div>

<div class="loader" id="loader">
  <div class="spinner"></div>
  解析中…（少々お待ちください）
</div>

<div class="result-card" id="resultCard">
  <img class="thumb" id="thumb" alt="thumbnail">
  <div class="md-body" id="mdBody"></div>
  <div class="action-row">
    <button class="btn-action btn-md" onclick="copyMarkdown()">Markdownをコピー</button>
    <button class="btn-action btn-notion-copy" onclick="copyNotion()">Notionにコピー</button>
  </div>
</div>

<script>
const $ = id => document.getElementById(id)
let rawMarkdown = ''

marked.setOptions({ breaks: true })

async function pasteUrl() {
  try {
    const text = await navigator.clipboard.readText()
    if (text.includes('youtube.com') || text.includes('youtu.be')) {
      $('ytUrl').value = text
    }
  } catch { $('ytUrl').focus() }
}

function extractVideoId(url) {
  const patterns = [
    /[?&]v=([^&#]+)/,
    /youtu\.be\/([^?&#]+)/,
    /youtube\.com\/shorts\/([^?&#]+)/,
    /youtube\.com\/embed\/([^?&#]+)/,
  ]
  for (const p of patterns) {
    const m = url.match(p)
    if (m) return m[1]
  }
  return null
}

function showError(msg) {
  $('errorMsg').textContent = msg
  $('errorMsg').classList.add('visible')
}

function clearError() { $('errorMsg').classList.remove('visible') }

async function summarize() {
  clearError()
  $('resultCard').classList.remove('visible')
  $('loader').classList.remove('visible')

  const url = $('ytUrl').value.trim()
  if (!url) { showError('YouTube URLを入力してください'); return }

  const videoId = extractVideoId(url)
  if (!videoId) { showError('有効なYouTube URLを入力してください'); return }

  const cleanUrl = `https://www.youtube.com/watch?v=${videoId}`
  $('runBtn').disabled = true
  $('loader').classList.add('visible')

  $('thumb').src = `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`
  $('thumb').classList.add('visible')

  let videoTitle = ''
  try {
    const oembed = await fetch(`https://www.youtube.com/oembed?url=${encodeURIComponent(cleanUrl)}&format=json`)
    if (oembed.ok) videoTitle = (await oembed.json()).title || ''
  } catch {}

  const titleLine = videoTitle ? `タイトル: **${videoTitle}**\nURL: ${cleanUrl}` : `URL: ${cleanUrl}`
  const prompt = `以下のYouTube動画を日本語で要約し、必ずMarkdown形式で出力してください。\n\n${titleLine}\n\n出力フォーマット（このまま使用）:\n\n## 📌 概要\n（動画のテーマと目的を2～3文で）\n\n---\n\n## ✅ 主なポイント\n- **ポイント1**: 説明\n- **ポイント2**: 説明\n- **ポイント3**: 説明\n- **ポイント4**: 説明\n- **ポイント5**: 説明\n\n---\n\n## 💡 結論・まとめ\n（最終的なメッセージや学びを2～3文で）\n\n---\n\n> 🎥 動画URL: ${cleanUrl}`

  try {
    const res = await fetch('https://text.pollinations.ai/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: [{ role: 'user', content: prompt }],
        model: 'openai',
        seed: 42,
        private: true
      })
    })

    if (!res.ok) throw new Error(`エラー (${res.status})`)
    const text = await res.text()
    if (!text) throw new Error('結果が取得できませんでした')

    rawMarkdown = text
    $('mdBody').innerHTML = marked.parse(text)
    $('resultCard').classList.add('visible')

  } catch (e) {
    showError(e.message)
    $('thumb').classList.remove('visible')
  } finally {
    $('runBtn').disabled = false
    $('loader').classList.remove('visible')
  }
}

function copyToClipboard(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    return navigator.clipboard.writeText(text).catch(() => fallbackCopy(text))
  }
  return fallbackCopy(text)
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea')
  ta.value = text
  ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;'
  document.body.appendChild(ta)
  ta.focus(); ta.select()
  try { document.execCommand('copy') } catch {}
  document.body.removeChild(ta)
  return Promise.resolve()
}

function copyMarkdown() {
  copyToClipboard(rawMarkdown).then(() => {
    const btn = document.querySelectorAll('.btn-action')[0]
    btn.textContent = '✓ コピー済'
    setTimeout(() => btn.textContent = 'Markdownをコピー', 1500)
  })
}

function copyNotion() {
  copyToClipboard(rawMarkdown).then(() => {
    const btn = document.querySelectorAll('.btn-action')[1]
    btn.textContent = '✓ コピー済 → Notionへ貼付'
    setTimeout(() => btn.textContent = 'Notionにコピー', 2000)
  })
}
</script>
</body>
</html>
