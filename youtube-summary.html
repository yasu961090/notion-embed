<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>URL 要約ツール</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
    background: #0d1117;
    color: #e6edf3;
    padding: 20px 16px 48px;
    min-height: 100vh;
  }
  h1 { font-size: 16px; color: #8b949e; text-align: center; margin-bottom: 4px; letter-spacing: 0.05em; }
  .sub { text-align: center; font-size: 11px; color: #484f58; margin-bottom: 24px; }
  .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
  label { font-size: 11px; color: #8b949e; display: block; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.08em; }
  input { width: 100%; background: #0d1117; border: 1px solid #30363d; border-radius: 8px; color: #e6edf3; font-size: 14px; padding: 10px 12px; outline: none; -webkit-appearance: none; }
  input:focus { border-color: #58a6ff; }
  .url-row { display: flex; gap: 8px; }
  .url-row input { flex: 1; }
  .btn-paste { background: #21262d; border: 1px solid #30363d; color: #8b949e; border-radius: 8px; padding: 10px 12px; font-size: 13px; cursor: pointer; white-space: nowrap; -webkit-tap-highlight-color: transparent; }
  .btn-paste:active { opacity: 0.7; }
  .type-row { display: flex; gap: 6px; margin-top: 10px; }
  .type-btn { flex: 1; padding: 7px 4px; border-radius: 6px; font-size: 11px; cursor: pointer; border: 1px solid #30363d; background: #21262d; color: #484f58; text-align: center; -webkit-tap-highlight-color: transparent; }
  .type-btn.active { border-color: #58a6ff; color: #58a6ff; background: #0d1117; }
  .btn-run { width: 100%; background: #1f6feb; border: none; color: #fff; border-radius: 10px; padding: 14px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 4px; -webkit-tap-highlight-color: transparent; transition: opacity 0.15s; }
  .btn-run:disabled { opacity: 0.4; cursor: default; }
  .btn-run:active:not(:disabled) { opacity: 0.8; }
  .loader { display: none; text-align: center; padding: 24px 0; color: #8b949e; font-size: 13px; }
  .loader.visible { display: block; }
  .loader-sub { font-size: 11px; color: #484f58; margin-top: 4px; }
  .spinner { width: 24px; height: 24px; border: 2px solid #30363d; border-top-color: #58a6ff; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error { display: none; color: #f85149; font-size: 13px; padding: 10px 12px; background: #2d1216; border: 1px solid #f8514933; border-radius: 8px; margin-top: 8px; }
  .error.visible { display: block; }
  .result-card { display: none; margin-top: 12px; }
  .result-card.visible { display: block; }
  .thumb { width: 100%; border-radius: 10px; margin-bottom: 10px; display: none; }
  .thumb.visible { display: block; }
  .result-title { display: none; font-size: 15px; font-weight: 700; color: #e6edf3; line-height: 1.5; margin-bottom: 8px; }
  .result-title.visible { display: block; }
  .source-badge { font-size: 11px; color: #8b949e; background: #21262d; border: 1px solid #30363d; border-radius: 6px; padding: 4px 10px; display: inline-block; margin-bottom: 10px; }
  .md-body { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 18px 16px; font-size: 14px; line-height: 1.8; color: #c9d1d9; }
  .md-body h2 { font-size: 15px; font-weight: 700; color: #e6edf3; margin: 18px 0 8px; padding-bottom: 4px; border-bottom: 1px solid #30363d; }
  .md-body h2:first-child { margin-top: 0; }
  .md-body h3 { font-size: 13px; font-weight: 600; color: #58a6ff; margin: 12px 0 6px; }
  .md-body p { margin: 6px 0; }
  .md-body ul { padding-left: 18px; margin: 6px 0; }
  .md-body li { margin: 4px 0; }
  .md-body strong { color: #e6edf3; }
  .md-body hr { border: none; border-top: 1px solid #30363d; margin: 14px 0; }
  .md-body blockquote { border-left: 3px solid #58a6ff; padding-left: 12px; color: #8b949e; margin: 8px 0; }
  .md-body .doc-title { font-size: 17px; font-weight: 700; color: #e6edf3; margin: 0 0 14px; padding-bottom: 10px; border-bottom: 2px solid #58a6ff; line-height: 1.4; }
  .md-body h2.insight { color: #f0b429; border-bottom-color: rgba(240,180,41,0.35); background: rgba(240,180,41,0.08); padding: 6px 10px; border-radius: 8px 8px 0 0; margin-top: 18px; }
  .md-body h2.insight + ul { background: rgba(240,180,41,0.05); border: 1px solid rgba(240,180,41,0.25); border-top: none; border-radius: 0 0 8px 8px; padding: 10px 12px 10px 30px; margin: 0 0 14px; }
  .md-body h2.insight + ul li { color: #f0d080; margin: 6px 0; }
  .action-row { display: flex; gap: 8px; margin-top: 10px; }
  .btn-copy-md { flex: 1; padding: 12px 8px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; -webkit-tap-highlight-color: transparent; background: #21262d; border: 1px solid #30363d; color: #8b949e; }
  .btn-copy-md:active { opacity: 0.7; }
  .btn-copy-notion { flex: 1; padding: 12px 8px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; -webkit-tap-highlight-color: transparent; background: #1f6feb; border: none; color: #fff; }
  .btn-copy-notion:active { opacity: 0.8; }
</style>
</head>
<body>
<h1>URL 要約ツール</h1>
<p class="sub">YouTube・ニュース・ブログ・記事 対応</p>

<div class="card">
  <label>URL を貼り付け</label>
  <div class="url-row">
    <input type="url" id="urlInput" placeholder="https://...">
    <button class="btn-paste" onclick="pasteUrl()">貼付</button>
  </div>
  <div class="type-row">
    <div class="type-btn active" id="t-auto" onclick="setType('auto')">🔍 自動判定</div>
    <div class="type-btn" id="t-yt" onclick="setType('youtube')">▶ YouTube</div>
    <div class="type-btn" id="t-web" onclick="setType('web')">🌐 Webページ</div>
  </div>
</div>

<button class="btn-run" id="runBtn" onclick="summarize()">要約する</button>

<div class="error" id="errorMsg"></div>

<div class="loader" id="loader">
  <div class="spinner"></div>
  <div id="loaderMsg">解析中…</div>
  <div class="loader-sub" id="loaderSub"></div>
</div>

<div class="result-card" id="resultCard">
  <img class="thumb" id="thumb" alt="thumbnail">
  <div class="result-title" id="resultTitle"></div>
  <div class="source-badge" id="sourceBadge"></div>
  <div class="md-body" id="mdBody"></div>
  <div class="action-row">
    <button class="btn-copy-md" id="btnMd" onclick="copyMarkdown()">Markdownをコピー</button>
    <button class="btn-copy-notion" id="btnNotion" onclick="copyNotion()">Notionにコピー</button>
  </div>
</div>

<script>
var $ = function(id) { return document.getElementById(id); };
var rawMarkdown = '';
var urlType = 'auto';

function setType(t) {
  urlType = t;
  document.querySelectorAll('.type-btn').forEach(function(b) { b.classList.remove('active'); });
  $('t-' + t).classList.add('active');
}

function parseMarkdown(md) {
  return md
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/^## (⚡.+)$/gm, '<h2 class="insight">$1</h2>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^---$/gm, '<hr>')
    .replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>')
    .replace(/^- \*\*(.+?)\*\*: (.+)$/gm, '<li><strong>$1</strong>: $2</li>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/(<li>[\s\S]*?<\/li>\n?)+/g, function(m) { return '<ul>' + m + '</ul>'; })
    .replace(/^(?!<[a-z]).+$/gm, function(m) { return m.trim() ? '<p>' + m + '</p>' : ''; })
    .replace(/\n/g, '');
}

function pasteUrl() {
  if (navigator.clipboard && navigator.clipboard.readText) {
    navigator.clipboard.readText().then(function(text) {
      $('urlInput').value = text;
    }).catch(function() { $('urlInput').focus(); });
  } else {
    $('urlInput').focus();
  }
}

function extractVideoId(url) {
  var patterns = [/[?&]v=([^&#]+)/, /youtu\.be\/([^?&#]+)/, /youtube\.com\/shorts\/([^?&#]+)/];
  for (var i = 0; i < patterns.length; i++) {
    var m = url.match(patterns[i]);
    if (m) return m[1];
  }
  return null;
}

function isYouTube(url) {
  return url.indexOf('youtube.com') !== -1 || url.indexOf('youtu.be') !== -1;
}

function showError(msg) { $('errorMsg').textContent = msg; $('errorMsg').classList.add('visible'); }
function clearError() { $('errorMsg').classList.remove('visible'); }

function fetchWithTimeout(url, ms) {
  var ctrl = new AbortController();
  var timer = setTimeout(function() { ctrl.abort(); }, ms || 8000);
  return fetch(url, { signal: ctrl.signal }).then(function(r) { clearTimeout(timer); return r; }, function(e) { clearTimeout(timer); throw e; });
}

function extractJsonString(html, key) {
  var marker = '"' + key + '":"';
  var start = html.indexOf(marker);
  if (start === -1) return '';
  var i = start + marker.length;
  var result = '';
  while (i < html.length) {
    var c = html[i];
    if (c === '\\') {
      var next = html[i + 1];
      if (next === 'n') { result += '\n'; i += 2; }
      else if (next === 't') { result += '\t'; i += 2; }
      else if (next === '"') { result += '"'; i += 2; }
      else if (next === '\\') { result += '\\'; i += 2; }
      else if (next === 'u') {
        var code = parseInt(html.slice(i + 2, i + 6), 16);
        result += String.fromCharCode(code);
        i += 6;
      } else { result += next; i += 2; }
    } else if (c === '"') {
      break;
    } else {
      result += c;
      i++;
    }
  }
  return result;
}

function extractCaptionUrl(html) {
  var idx = html.indexOf('timedtext');
  if (idx === -1) return '';
  var before = html.lastIndexOf('"baseUrl":"', idx);
  if (before === -1) return '';
  var i = before + 11;
  var url = '';
  while (i < html.length && html[i] !== '"') {
    if (html[i] === '\\') {
      var next = html[i + 1];
      if (next === 'u') {
        var code = parseInt(html.slice(i + 2, i + 6), 16);
        url += String.fromCharCode(code);
        i += 6;
      } else if (next === '/') {
        url += '/'; i += 2;
      } else { url += next; i += 2; }
    } else { url += html[i]; i++; }
  }
  return (url.indexOf('timedtext') !== -1) ? url : '';
}

async function fetchYouTubeContent(videoId) {
  try {
    var ytUrl = 'https://www.youtube.com/watch?v=' + videoId;
    var res = await fetchWithTimeout('https://api.allorigins.win/get?url=' + encodeURIComponent(ytUrl), 8000);
    if (!res.ok) return {};
    var data = await res.json();
    var html = data.contents;
    if (!html) return {};

    var description = extractJsonString(html, 'shortDescription').slice(0, 1500);
    var captionUrl = extractCaptionUrl(html);
    var transcript = '';

    if (captionUrl) {
      try {
        var cr = await fetchWithTimeout('https://api.allorigins.win/get?url=' + encodeURIComponent(captionUrl), 6000);
        if (cr.ok) {
          var cd = await cr.json();
          var xml = cd.contents;
          if (xml && xml.indexOf('<text') !== -1) {
            var doc = new DOMParser().parseFromString(xml, 'text/xml');
            transcript = Array.from(doc.querySelectorAll('text'))
              .map(function(t) { return t.textContent; })
              .join(' ').replace(/\s+/g, ' ').trim().slice(0, 3000);
          }
        }
      } catch(e) {}
    }
    return { description: description, transcript: transcript };
  } catch(e) { return {}; }
}

function parseHtml(html) {
  var parser = new DOMParser();
  var doc = parser.parseFromString(html, 'text/html');
  ['script','style','nav','header','footer','aside','iframe','noscript'].forEach(function(tag) {
    doc.querySelectorAll(tag).forEach(function(el) { el.remove(); });
  });
  var main = doc.querySelector('article, main, [role="main"], .post-content, .article-body, .entry-content') || doc.body;
  var titleEl = doc.querySelector('title');
  var title = titleEl ? titleEl.textContent.trim() : '';
  var text = main ? (main.innerText || main.textContent || '') : '';
  var cleaned = text.replace(/\s+/g, ' ').trim().slice(0, 4000);
  return cleaned.length >= 100 ? { title: title, text: cleaned } : null;
}

async function fetchPageText(url) {
  // 1. Jina AI Reader: JS描画サイト・ニュースサイトに強い専用サービス
  try {
    var jinaRes = await fetchWithTimeout('https://r.jina.ai/' + url, 15000);
    if (jinaRes.ok) {
      var jinaText = await jinaRes.text();
      if (jinaText && jinaText.length > 300) {
        var titleMatch = jinaText.match(/^Title:\s*(.+)$/m);
        var title = titleMatch ? titleMatch[1].trim() : '';
        var cleaned = jinaText
          .replace(/^(Title|URL|Published Time|Description|Author|Source):\s*.+\n?/gm, '')
          .replace(/!\[.*?\]\(.*?\)/g, '')
          .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
          .replace(/\s+/g, ' ').trim().slice(0, 4000);
        if (cleaned.length >= 100) return { title: title, text: cleaned };
      }
    }
  } catch(e) {}

  // 2. CORSプロキシ（フォールバック）
  var ampUrl = url.replace(/\/$/, '') + '.amp';
  var proxies = [
    { url: 'https://api.allorigins.win/get?url=' + encodeURIComponent(url), json: true },
    { url: 'https://corsproxy.io/?' + encodeURIComponent(url), json: false },
    { url: 'https://api.allorigins.win/get?url=' + encodeURIComponent(ampUrl), json: true },
    { url: 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(url), json: false },
    { url: 'https://corsproxy.io/?' + encodeURIComponent(ampUrl), json: false },
    { url: 'https://thingproxy.freeboard.io/fetch/' + url, json: false }
  ];
  for (var i = 0; i < proxies.length; i++) {
    try {
      var res = await fetchWithTimeout(proxies[i].url, 9000);
      if (!res.ok) continue;
      var html;
      if (proxies[i].json) {
        var data = await res.json();
        html = data.contents || '';
      } else {
        html = await res.text();
      }
      if (!html || html.length < 200) continue;
      var result = parseHtml(html);
      if (result) return result;
    } catch(e) {}
  }
  throw new Error('ページを取得できませんでした。会員制・有料記事・アクセス制限があるサイトは対応できません。');
}

function mdFormat(sourceUrl) {
  return '\n次の形式でMarkdown出力してください：\n\n## 📌 概要\n（テーマと目的を2〜3文で）\n\n---\n\n## ✅ 主なポイント\n- **ポイント1**: 説明\n- **ポイント2**: 説明\n- **ポイント3**: 説明\n- **ポイント4**: 説明\n- **ポイント5**: 説明\n\n---\n\n## ⚡ 重要・示唆\n- **示唆1**: この内容から特に重要な気づきや行動につながる点\n- **示唆2**: 見落としやすいが本質的な視点\n- **示唆3**: 実践や応用に活かせるポイント\n\n---\n\n## 💡 結論・まとめ\n（最終的なメッセージや学びを2〜3文で）\n\n---\n\n> 🔗 URL: ' + sourceUrl;
}

function showTitle(text) {
  if (text) {
    $('resultTitle').textContent = text;
    $('resultTitle').classList.add('visible');
  } else {
    $('resultTitle').classList.remove('visible');
  }
}

async function summarize() {
  clearError();
  $('resultCard').classList.remove('visible');
  $('loader').classList.remove('visible');
  $('resultTitle').classList.remove('visible');

  var url = $('urlInput').value.trim();
  if (!url) { showError('URLを入力してください'); return; }
  if (url.indexOf('http') !== 0) { showError('http または https で始まるURLを入力してください'); return; }

  var detectedYT = isYouTube(url);
  var useYT = urlType === 'youtube' || (urlType === 'auto' && detectedYT);

  $('runBtn').disabled = true;
  $('loader').classList.add('visible');
  $('thumb').classList.remove('visible');

  var prompt = '';
  var sourceLabel = '';
  var displayTitle = '';

  if (useYT) {
    var videoId = extractVideoId(url);
    if (!videoId) {
      showError('有効なYouTube URLを入力してください');
      $('runBtn').disabled = false;
      $('loader').classList.remove('visible');
      return;
    }

    $('loaderMsg').textContent = '字幕・タイトルを取得中…';
    $('loaderSub').textContent = '並列で取得しています';

    $('thumb').src = 'https://img.youtube.com/vi/' + videoId + '/hqdefault.jpg';
    $('thumb').classList.add('visible');

    // oEmbed と YouTube本文取得を並列実行
    var oembedUrl = 'https://www.youtube.com/oembed?url=' + encodeURIComponent('https://www.youtube.com/watch?v=' + videoId) + '&format=json';
    var results = await Promise.all([
      fetchWithTimeout(oembedUrl, 5000).then(function(r) { return r.ok ? r.json() : {}; }).catch(function() { return {}; }),
      fetchYouTubeContent(videoId)
    ]);
    var oembedData = results[0];
    var ytContent = results[1];

    var title = oembedData.title || '';
    displayTitle = title;
    var cleanUrl = 'https://www.youtube.com/watch?v=' + videoId;
    sourceLabel = '▶ YouTube';

    $('loaderMsg').textContent = 'AIで要約中…';
    $('loaderSub').textContent = '';

    var contentText = ytContent.transcript || ytContent.description || '';
    var contentLabel = ytContent.transcript ? '字幕テキスト' : (ytContent.description ? '動画説明欄' : '');

    if (contentText) {
      prompt = '以下のYouTube動画の' + contentLabel + 'を日本語で要約し、必ずMarkdown形式で出力してください。\n\n'
        + (title ? 'タイトル: **' + title + '**\n' : '')
        + 'URL: ' + cleanUrl + '\n\n--- ' + contentLabel + ' ---\n' + contentText + '\n--- ここまで ---\n'
        + mdFormat(cleanUrl);
    } else {
      prompt = '以下のYouTube動画のタイトルをもとに内容を日本語で推測・要約し、必ずMarkdown形式で出力してください。\n\n'
        + (title ? 'タイトル: **' + title + '**\n' : '')
        + 'URL: ' + cleanUrl + '\n'
        + mdFormat(cleanUrl);
    }

  } else {
    $('loaderMsg').textContent = 'ページを取得中…';
    $('loaderSub').textContent = 'サイトによって数秒かかります';

    try {
      var hostname = new URL(url).hostname;
      sourceLabel = '🌐 ' + hostname;
    } catch(e) { sourceLabel = '🌐 Web'; }

    var pageData;
    try {
      pageData = await fetchPageText(url);
    } catch(e) {
      showError(e.message);
      $('runBtn').disabled = false;
      $('loader').classList.remove('visible');
      return;
    }

    displayTitle = pageData.title || '';
    $('loaderMsg').textContent = 'AIで要約中…';
    $('loaderSub').textContent = '';

    prompt = '以下のWebページの内容を日本語で要約し、必ずMarkdown形式で出力してください。\n\n'
      + (pageData.title ? 'タイトル: **' + pageData.title + '**\n' : '')
      + 'URL: ' + url + '\n\n--- ページ本文 ---\n' + pageData.text + '\n--- 本文ここまで ---\n'
      + mdFormat(url);
  }

  $('sourceBadge').textContent = sourceLabel;
  showTitle(displayTitle);

  try {
    var res = await fetch('https://text.pollinations.ai/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: [{ role: 'user', content: prompt }], model: 'openai', seed: 42, private: true })
    });
    if (!res.ok) throw new Error('エラー (' + res.status + ')');
    var text = await res.text();
    if (!text) throw new Error('結果が取得できませんでした');
    var titleHtml = displayTitle ? '<div class="doc-title">' + displayTitle.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</div>' : '';
    rawMarkdown = (displayTitle ? '# ' + displayTitle + '\n\n' : '') + text;
    $('mdBody').innerHTML = titleHtml + parseMarkdown(text);
    $('resultCard').classList.add('visible');
  } catch(e) {
    showError(e.message);
    $('thumb').classList.remove('visible');
    $('resultTitle').classList.remove('visible');
  }

  $('runBtn').disabled = false;
  $('loader').classList.remove('visible');
}

function execCopy(text) {
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try { document.execCommand('copy'); } catch(e) {}
  document.body.removeChild(ta);
}

function copyText(text, btnId) {
  var btn = $(btnId);
  var orig = btn.textContent;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).catch(function() { execCopy(text); });
  } else {
    execCopy(text);
  }
  btn.textContent = '✓ コピー済';
  setTimeout(function() { btn.textContent = orig; }, 1800);
}

function copyMarkdown() { copyText(rawMarkdown, 'btnMd'); }
function copyNotion() { copyText(rawMarkdown, 'btnNotion'); }
</script>
</body>
</html>
